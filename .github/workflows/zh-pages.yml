name: build and deploy Chinese reference manual to gh-pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zh-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/download/v4.2.2/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Lean Version
        run: |
          lean --version

      - name: Add Unix utilities to PATH on Windows-like runners
        if: runner.os == 'Windows'
        run: |
          echo "C:\Program Files\Git\usr\bin" >> "$GITHUB_PATH"

      - name: Cache Lake build directories
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build/bin
            .lake/build/ir
            .lake/build/lib
          key: ${{ runner.os }}-lake-zh-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-lake-zh-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}-
            ${{ runner.os }}-lake-zh-${{ hashFiles('lean-toolchain') }}-

      - name: Build Chinese manual
        shell: bash
        run: |
          set -o pipefail
          {
            lake --no-ansi build generate-manual-zh
            bash ./generate-html-zh.sh --mode preview
          } 2>&1 | tee build-zh-ci.log

      - name: Report Chinese build failure
        if: failure()
        shell: bash
        run: |
          if [ -f build-zh-ci.log ]; then
            python3 - <<'PY'
          from pathlib import Path
          lines = Path("build-zh-ci.log").read_text(errors="replace").splitlines()
          needles = (
              "Ambiguous",
              "Couldn't",
              "Duplicate tag",
              "Failed",
              "No destination found",
              "No external tag",
              "No source found",
              "No term def",
              "Remote ",
              "errors were encountered",
          )
          interesting = [
              line for line in lines
              if line.startswith(("error:", "✖", "Some required targets", "- Manual", "- ManualZh"))
              or any(needle in line for needle in needles)
          ]
          def emit(title, selected):
              text = "\n".join(selected)
              text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error title={title}::{text}")
          emit("Chinese manual build errors", interesting[-80:] or ["No error lines captured"])
          emit("Chinese manual build tail", lines[-30:])
          PY
          fi

      - name: Upload Chinese HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: chinese-reference-manual-html
          path: _out/site-zh/
          retention-days: 5
          overwrite: true

      - name: Deploy Chinese manual to gh-pages
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          touch _out/site-zh/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            git worktree add -B gh-pages gh-pages-worktree
          fi
          find gh-pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a _out/site-zh/. gh-pages-worktree/
          cd gh-pages-worktree
          git add -A
          git commit -m "Deploy Chinese reference manual to GitHub Pages" || exit 0
          git push origin gh-pages
